<div class="label font-serif">
    @let words = this.translate.instant('aboutAuthor.itWas') | sentenceToWord;
    @for(word of words; track $index) {
        <span class="word text-contrast-medium text-2xl" [class.normal]="true" [style.animationDelay]="$index * 0.75 + 's'">
            {{ word }}
        </span>
    }
    <span class="word text-5xl text-accent" [style.animationDelay]="(words.length * 0.75 + 1)+ 's'">
        {{ 'aboutAuthor.me' | translate }}
    </span>
</div>
